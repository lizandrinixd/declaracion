<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mi Declaración de Amor 💕</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            background: linear-gradient(180deg, #ff9ec8, #ff69b4, #ff1493);
            font-family: 'Press Start 2P', system-ui;
            color: #fff;
            text-align: center;
            position: relative;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        #start-screen {
            z-index: 10;
        }

        #declaration, #question, #final-screen {
            display: none;
        }

        h1 {
            font-size: clamp(2.2rem, 9vw, 4rem);
            text-shadow: 
                6px 6px 0 #222,
                -3px -3px 0 #222,
                3px -3px 0 #222,
                -3px 3px 0 #222;
            color: #fff;
            margin-bottom: 40px;
            padding: 15px;
            line-height: 1.2;
        }

        #love-phrase {
            font-size: clamp(1.9rem, 8vw, 3.8rem);
            line-height: 1.3;
            text-shadow: 
                6px 6px 0 #222,
                -2px -2px 0 #222,
                2px -2px 0 #222,
                -2px 2px 0 #222;
            color: #ff0;
            margin-bottom: 30px;
            padding: 25px 15px;
            background: rgba(0, 0, 0, 0.35);
            border: 8px solid #fff;
            text-transform: uppercase;
            letter-spacing: 4px;
        }

        button {
            font-family: 'Press Start 2P', system-ui;
            font-size: clamp(1.6rem, 7vw, 2.8rem);
            padding: 25px 60px;
            margin: 20px;
            border: 8px solid #222;
            background: #ff0;
            color: #222;
            cursor: pointer;
            box-shadow: 8px 8px 0 #222;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        button:active {
            transform: scale(0.92);
            box-shadow: 4px 4px 0 #222;
        }

        #start-btn {
            background: #ffff00;
            color: #222;
            padding: 30px 80px;
            font-size: clamp(2rem, 8vw, 3.5rem);
            box-shadow: 10px 10px 0 #222;
        }

        .buttons {
            display: flex;
            justify-content: center;
            gap: 40px;
            flex-wrap: wrap;
            margin-top: 30px;
        }

        #no-btn {
            background: #ff1493;
            color: #fff;
        }

        .message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            color: #ff0;
            padding: 35px 60px;
            font-size: clamp(2rem, 8vw, 3.5rem);
            border: 10px solid #fff;
            display: none;
            z-index: 20;
            box-shadow: 0 0 0 12px #222;
        }

        .final-section h1 {
            font-size: clamp(2.5rem, 11vw, 5rem);
            color: #ff0;
            animation: pulseText 1.5s infinite;
        }

        @keyframes pulseText {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.08); }
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <!-- PANTALLA INICIAL -->
    <div class="overlay" id="start-screen">
        <h1>¿Preparada para mi declaración?</h1>
        <button id="start-btn">DECLARACIÓN</button>
    </div>

    <!-- DECLARACIÓN DE AMOR -->
    <div class="overlay" id="declaration">
        <div>
            <h1 id="love-phrase">TE AMO</h1>
        </div>
    </div>

    <!-- PREGUNTA -->
    <div class="overlay" id="question">
        <div>
            <h1>¿QUIERES SER MI NOVIA?</h1>
            <div class="buttons">
                <button id="si-btn">SÍ</button>
                <button id="no-btn">NO</button>
            </div>
        </div>
    </div>

    <!-- MENSAJE "ESTOY JUGANDO" -->
    <div class="message" id="playing-message">
        ¡ESTOY JUGANDO! 😏
    </div>

    <!-- PANTALLA FINAL -->
    <div class="overlay final-section" id="final-screen">
        <div>
            <h1 id="final-text">¡YO TAMBIÉN QUIERO SERLO!</h1>
            <p style="font-size:1.4rem; margin-top:30px; color:#fff;">💕 Te amo con todo mi corazón 💕</p>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        let width, height;
        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
        }
        window.addEventListener('resize', resize);
        resize();

        let particles = [];
        let bees = [];
        let specialHeart = null;
        let currentMode = 'roses';

        class Particle {
            constructor(type) {
                this.type = type;
                this.reset();
            }
            reset() {
                this.x = Math.random() * width;
                this.y = -50;
                this.size = this.type === 'bee' ? 28 : (this.type === 'heart' ? 35 : 40);
                this.speed = this.type === 'bee' ? 2 : 3.5 + Math.random() * 3;
                this.vx = this.type === 'bee' ? (Math.random()*4-2) : (Math.random()*2-1);
                this.vy = this.speed;
                this.angle = Math.random() * Math.PI * 2;
                this.swing = 20 + Math.random() * 25;
            }
            update() {
                if (this.type === 'bee') {
                    this.angle += 0.08;
                    this.x += Math.cos(this.angle) * 3.5 + this.vx;
                    this.y += Math.sin(this.angle) * 2 + 1.5;
                    if (this.x < 0 || this.x > width) this.vx *= -1;
                    if (this.y < 0) this.y = height;
                } else {
                    this.y += this.vy;
                    this.x += Math.sin(this.y / this.swing) * 2;
                    if (this.y > height + 100) this.reset();
                }
            }
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                if (this.type !== 'bee') ctx.rotate(Math.sin(this.y/60)*0.4);
                ctx.font = this.size + 'px system-ui';
                ctx.fillText(this.type === 'rose' ? '🌹' : this.type === 'white' ? '🌸' : this.type === 'heart' ? '❤️' : '🐝', 0, 0);
                ctx.restore();
            }
        }

        function createRoses() {
            particles = [];
            for (let i = 0; i < 65; i++) {
                particles.push(new Particle(Math.random() > 0.5 ? 'rose' : 'white'));
            }
        }

        function createBeesAndHearts() {
            particles = [];
            bees = [];
            for (let i = 0; i < 4; i++) {
                let bee = new Particle('bee');
                bee.x = width * (0.15 + i*0.23);
                bee.y = height * 0.25 + Math.random()*80;
                bees.push(bee);
            }
            for (let i = 0; i < 40; i++) {
                particles.push(new Particle('heart'));
            }
        }

        function createFinalHeart() {
            specialHeart = {
                x: width/2,
                y: height/2,
                vx: 5,
                vy: 5,
                size: 90,
                pulse: 1
            };
        }

        function animate() {
            ctx.clearRect(0, 0, width, height);
            
            if (currentMode === 'roses' || currentMode === 'beeshearts') {
                particles.forEach(p => { p.update(); p.draw(); });
            }
            if (currentMode === 'beeshearts') {
                bees.forEach(b => { b.update(); b.draw(); });
            }
            if (currentMode === 'finalheart' && specialHeart) {
                specialHeart.pulse = Math.sin(Date.now()/120) * 0.25 + 1;
                specialHeart.x += specialHeart.vx;
                specialHeart.y += specialHeart.vy;
                
                if (specialHeart.x < 60 || specialHeart.x > width-60) specialHeart.vx *= -1;
                if (specialHeart.y < 60 || specialHeart.y > height-60) specialHeart.vy *= -1;

                ctx.save();
                ctx.translate(specialHeart.x, specialHeart.y);
                ctx.scale(specialHeart.pulse, specialHeart.pulse);
                ctx.font = (specialHeart.size * specialHeart.pulse) + 'px system-ui';
                ctx.fillText('❤️', -specialHeart.size/2, specialHeart.size/3);
                ctx.restore();
            }
            requestAnimationFrame(animate);
        }

        // Frases bonitas (6 palabras aprox.)
        const phrases = [
            "ERES LA PERSONA MÁS ESPECIAL",
            "MI CORAZÓN LATE SOLO POR TI",
            "CONTIGO EL MUNDO ES HERMOSO",
            "TE AMO MÁS QUE AYER",
            "ERES MI SUEÑO HECHO REALIDAD",
            "SIEMPRE QUIERO ESTAR CONTIGO"
        ];

        let phraseIndex = 0;
        const phraseEl = document.getElementById('love-phrase');

        function showNextPhrase() {
            phraseEl.style.opacity = 0;
            setTimeout(() => {
                phraseEl.textContent = phrases[phraseIndex];
                phraseEl.style.opacity = 1;
                phraseIndex = (phraseIndex + 1) % phrases.length;
            }, 500);
        }

        function startDeclaration() {
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('declaration').style.display = 'flex';
            
            currentMode = 'roses';
            createRoses();
            phraseEl.textContent = phrases[0];

            const interval = setInterval(() => {
                if (currentMode !== 'roses') {
                    clearInterval(interval);
                    return;
                }
                showNextPhrase();
                if (phraseIndex === 0) {
                    clearInterval(interval);
                    setTimeout(endDeclaration, 1500);
                }
            }, 8000);
        }

        function endDeclaration() {
            document.getElementById('declaration').style.display = 'none';
            currentMode = 'beeshearts';
            createBeesAndHearts();
            document.getElementById('question').style.display = 'flex';
        }

        // Botones de Sí y No
        let siClicks = 0;
        const siBtn = document.getElementById('si-btn');
        const noBtn = document.getElementById('no-btn');
        const playingMsg = document.getElementById('playing-message');
        const finalScreen = document.getElementById('final-screen');

        function randomPosition(btn) {
            const maxX = Math.min(width * 0.8, width - 200);
            const maxY = Math.min(height * 0.75, height - 180);
            const x = Math.random() * (maxX - 100) + 50;
            const y = Math.random() * (maxY - 100) + 80;
            btn.style.position = 'absolute';
            btn.style.left = x + 'px';
            btn.style.top = y + 'px';
        }

        siBtn.addEventListener('click', () => {
            siClicks++;
            if (siClicks <= 4) {
                randomPosition(siBtn);
            } else if (siClicks === 5) {
                playingMsg.style.display = 'block';
                setTimeout(() => playingMsg.style.display = 'none', 2000);
            } else {
                currentMode = 'finalheart';
                createFinalHeart();
                document.getElementById('question').style.display = 'none';
                finalScreen.style.display = 'flex';
            }
        });

        noBtn.addEventListener('click', () => {
            randomPosition(noBtn);
        });

        // Iniciar al presionar "DECLARACIÓN"
        document.getElementById('start-btn').addEventListener('click', () => {
            startDeclaration();
        });

        // Animación principal
        animate();

        console.log('%c💕 Declaración de amor lista para sorprenderla 💕', 'color:#ff1493; font-size:18px; font-family:Press Start 2P');
    </script>
</body>
</html>
