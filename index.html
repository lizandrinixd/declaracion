<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mi Declaración de Amor 💕</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            background: linear-gradient(180deg, #ff9ec8, #ff69b4, #ff1493);
            font-family: 'Press Start 2P', system-ui;
            color: #fff;
            text-align: center;
            position: relative;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            pointer-events: none;
        }

        .section {
            width: 100%;
            max-width: 100%;
            pointer-events: auto;
        }

        #declaration {
            animation: fadeIn 1s ease;
        }

        #love-phrase {
            font-size: clamp(1.8rem, 8vw, 3.5rem);
            line-height: 1.3;
            text-shadow: 
                6px 6px 0 #222,
                -2px -2px 0 #222,
                2px -2px 0 #222,
                -2px 2px 0 #222;
            color: #ff0;
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(0, 0, 0, 0.3);
            border: 8px solid #fff;
            border-radius: 0;
            text-transform: uppercase;
            letter-spacing: 4px;
        }

        #question {
            display: none;
        }

        #question h1 {
            font-size: clamp(2rem, 9vw, 4rem);
            text-shadow: 
                6px 6px 0 #222,
                -2px -2px 0 #222,
                2px -2px 0 #222,
                -2px 2px 0 #222;
            color: #fff;
            margin-bottom: 40px;
            padding: 15px;
        }

        .buttons {
            display: flex;
            justify-content: center;
            gap: 40px;
            flex-wrap: wrap;
            width: 100%;
            max-width: 600px;
        }

        button {
            font-family: 'Press Start 2P', system-ui;
            font-size: clamp(1.5rem, 6vw, 2.5rem);
            padding: 25px 50px;
            margin: 10px;
            border: 8px solid #222;
            background: #ff0;
            color: #222;
            cursor: pointer;
            box-shadow: 8px 8px 0 #222;
            transition: all 0.2s ease;
            min-width: 160px;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        button:active {
            transform: scale(0.95);
            box-shadow: 3px 3px 0 #222;
        }

        #no-btn {
            background: #ff1493;
            color: #fff;
        }

        .final-section {
            display: none;
            flex-direction: column;
            align-items: center;
        }

        #final-text {
            font-size: clamp(2.2rem, 10vw, 4.5rem);
            text-shadow: 
                6px 6px 0 #222,
                -2px -2px 0 #222,
                2px -2px 0 #222,
                -2px 2px 0 #222;
            color: #ff0;
            margin: 30px 0;
            animation: pulseText 1.5s infinite;
        }

        .message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.85);
            color: #ff0;
            padding: 30px 50px;
            font-size: clamp(1.8rem, 7vw, 3rem);
            border: 10px solid #fff;
            display: none;
            z-index: 10;
            box-shadow: 0 0 0 10px #222;
            animation: popIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes pulseText {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.08); }
        }

        @keyframes popIn {
            0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        }

        .footer {
            position: absolute;
            bottom: 20px;
            font-size: 1rem;
            color: rgba(255,255,255,0.8);
            z-index: 3;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <!-- DECLARACIÓN DE AMOR -->
    <div class="overlay" id="declaration">
        <div class="section">
            <h1 id="love-phrase">CARGANDO AMOR...</h1>
            <div class="footer">Toca la pantalla si quieres saltar ❤️</div>
        </div>
    </div>

    <!-- PREGUNTA + BOTONES -->
    <div class="overlay" id="question">
        <div class="section">
            <h1 id="proposal-text">¿QUIERES SER MI NOVIA?</h1>
            <div class="buttons">
                <button id="si-btn">SÍ</button>
                <button id="no-btn">NO</button>
            </div>
        </div>
    </div>

    <!-- MENSAJE "ESTOY JUGANDO" -->
    <div class="message" id="playing-message">
        ¡ESTOY JUGANDO! 😏
    </div>

    <!-- PANTALLA FINAL -->
    <div class="overlay final-section" id="final-screen">
        <div class="section">
            <h1 id="final-text">¡YO TAMBIÉN QUIERO SERLO!</h1>
            <div class="footer">💕 Te amo con todo mi corazón 💕</div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        let width, height;
        function resizeCanvas() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // Partículas
        let particles = [];
        let bees = [];
        let specialHeart = null;
        let currentMode = 'roses'; // roses, beeshearts, finalheart

        class Particle {
            constructor(type) {
                this.type = type; // 'rose', 'white', 'heart', 'bee'
                this.reset();
            }
            
            reset() {
                this.x = Math.random() * width;
                this.y = Math.random() * height - height;
                this.size = this.type === 'bee' ? 28 : (this.type === 'heart' ? 32 : 38);
                this.speed = this.type === 'bee' ? 1.8 : 3 + Math.random() * 3;
                this.vx = this.type === 'bee' ? (Math.random() * 4 - 2) : (Math.random() * 2 - 1);
                this.vy = this.type === 'bee' ? (Math.random() * 2 - 1) : this.speed;
                this.angle = Math.random() * Math.PI * 2;
                this.swing = Math.random() * 30 + 15;
                this.life = 1;
            }
            
            update() {
                if (this.type === 'bee') {
                    // Abejas vuelan en zigzag
                    this.angle += 0.05;
                    this.x += Math.cos(this.angle) * 3 + this.vx;
                    this.y += Math.sin(this.angle * 1.5) * 2 + this.vy;
                    
                    // Mantener en pantalla
                    if (this.x < 0 || this.x > width) this.vx *= -1;
                    if (this.y < 0) this.y = height;
                    if (this.y > height) this.y = 0;
                } else {
                    // Rosas y corazones caen
                    this.y += this.vy;
                    this.x += Math.sin(this.y / this.swing) * 1.5;
                    
                    if (this.y > height + 50) this.reset();
                }
            }
            
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                if (this.type !== 'bee') {
                    ctx.rotate(Math.sin(this.y / 80) * 0.3);
                }
                
                if (this.type === 'rose') {
                    ctx.font = '38px system-ui';
                    ctx.fillText('🌹', 0, 0);
                } else if (this.type === 'white') {
                    ctx.font = '38px system-ui';
                    ctx.fillText('🌸', 0, 0);
                } else if (this.type === 'heart') {
                    ctx.font = '32px system-ui';
                    ctx.fillText('❤️', 0, 0);
                } else if (this.type === 'bee') {
                    ctx.font = '28px system-ui';
                    ctx.fillText('🐝', 0, 0);
                }
                ctx.restore();
            }
        }

        function createRoses(count) {
            particles = [];
            for (let i = 0; i < count; i++) {
                const p = new Particle(Math.random() > 0.5 ? 'rose' : 'white');
                particles.push(p);
            }
        }

        function createBeesAndHearts() {
            particles = [];
            bees = [];
            // 4 abejas fijas
            for (let i = 0; i < 4; i++) {
                const bee = new Particle('bee');
                bee.x = width * (0.2 + i * 0.2);
                bee.y = height * 0.3 + Math.random() * 100;
                bees.push(bee);
            }
            // Corazones cayendo
            for (let i = 0; i < 35; i++) {
                const h = new Particle('heart');
                particles.push(h);
            }
        }

        function createFinalHeart() {
            specialHeart = {
                x: width / 2,
                y: height / 2,
                size: 80,
                vx: 4 + Math.random() * 3,
                vy: 4 + Math.random() * 3,
                pulse: 0
            };
        }

        function animate() {
            ctx.clearRect(0, 0, width, height);
            
            if (currentMode === 'roses') {
                particles.forEach(p => {
                    p.update();
                    p.draw();
                });
            } 
            else if (currentMode === 'beeshearts') {
                // Corazones
                particles.forEach(p => {
                    p.update();
                    p.draw();
                });
                // Abejas
                bees.forEach(bee => {
                    bee.update();
                    bee.draw();
                });
            } 
            else if (currentMode === 'finalheart' && specialHeart) {
                // Corazón grande que rebota y palpita
                specialHeart.pulse = Math.sin(Date.now() / 150) * 0.3 + 1;
                const currentSize = specialHeart.size * specialHeart.pulse;
                
                // Movimiento
                specialHeart.x += specialHeart.vx;
                specialHeart.y += specialHeart.vy;
                
                // Rebote en bordes
                if (specialHeart.x < 50 || specialHeart.x > width - 50) specialHeart.vx *= -1;
                if (specialHeart.y < 50 || specialHeart.y > height - 50) specialHeart.vy *= -1;
                
                ctx.save();
                ctx.translate(specialHeart.x, specialHeart.y);
                ctx.scale(specialHeart.pulse, specialHeart.pulse);
                ctx.font = `${currentSize}px system-ui`;
                ctx.fillText('❤️', -currentSize / 2, currentSize / 3);
                ctx.restore();
            }
            
            requestAnimationFrame(animate);
        }

        // Frases de amor (cada una de aproximadamente 6 palabras)
        const lovePhrases = [
            "MI AMOR POR TI ES ETERNO",
            "CADA DÍA TE AMO MÁS",
            "ERES LA LUZ DE MI VIDA",
            "CONTIGO SOY EL MÁS FELIZ",
            "TU SONRISA ILUMINA MI MUNDO",
            "TE AMO CON TODO MI CORAZÓN"
        ];

        let phraseIndex = 0;
        const phraseEl = document.getElementById('love-phrase');

        function showNextPhrase() {
            phraseEl.style.opacity = 0;
            
            setTimeout(() => {
                phraseEl.textContent = lovePhrases[phraseIndex];
                phraseEl.style.opacity = 1;
                phraseIndex = (phraseIndex + 1) % lovePhrases.length;
            }, 400);
        }

        // Iniciar declaración
        function startDeclaration() {
            currentMode = 'roses';
            createRoses(60);
            phraseEl.textContent = lovePhrases[0];
            
            // Cambiar frase cada 8 segundos
            const phraseInterval = setInterval(() => {
                if (currentMode !== 'roses') {
                    clearInterval(phraseInterval);
                    return;
                }
                showNextPhrase();
                
                // Después de 6 frases completas pasamos a la pregunta
                if (phraseIndex === 0) {
                    clearInterval(phraseInterval);
                    setTimeout(() => {
                        endDeclaration();
                    }, 1000);
                }
            }, 8000);
            
            // Opción para saltar tocando
            document.getElementById('declaration').addEventListener('click', () => {
                if (currentMode === 'roses') {
                    endDeclaration();
                }
            }, { once: true });
        }

        function endDeclaration() {
            document.getElementById('declaration').style.display = 'none';
            currentMode = 'beeshearts';
            createBeesAndHearts();
            document.getElementById('question').style.display = 'flex';
        }

        // Botones
        let siClicks = 0;
        const siBtn = document.getElementById('si-btn');
        const noBtn = document.getElementById('no-btn');
        const playingMsg = document.getElementById('playing-message');
        const finalScreen = document.getElementById('final-screen');

        function moveButton(btn) {
            const maxX = width * 0.75;
            const maxY = height * 0.7;
            const minX = width * 0.1;
            const minY = height * 0.2;
            
            const newX = Math.random() * (maxX - minX) + minX;
            const newY = Math.random() * (maxY - minY) + minY;
            
            btn.style.position = 'absolute';
            btn.style.left = `${newX}px`;
            btn.style.top = `${newY}px`;
        }

        siBtn.addEventListener('click', () => {
            siClicks++;
            
            if (siClicks <= 4) {
                moveButton(siBtn);
            } 
            else if (siClicks === 5) {
                // 5to clic: estoy jugando
                playingMsg.style.display = 'block';
                setTimeout(() => {
                    playingMsg.style.display = 'none';
                }, 2200);
            } 
            else {
                // 6to clic en adelante: final
                currentMode = 'finalheart';
                createFinalHeart();
                document.getElementById('question').style.display = 'none';
                finalScreen.style.display = 'flex';
                siBtn.style.display = 'none';
                noBtn.style.display = 'none';
            }
        });

        noBtn.addEventListener('click', () => {
            moveButton(noBtn);
            // Efecto extra: los corazones caen un poco más rápido
            if (currentMode === 'beeshearts') {
                particles.forEach(p => {
                    if (p.type === 'heart') p.vy += 1;
                });
            }
        });

        // Iniciar todo
        window.onload = () => {
            animate();
            startDeclaration();
            
            // Asegurar que los botones sean grandes en móvil
            console.log('%c✅ Código de declaración de amor generado con éxito', 'color:#ff1493; font-size:18px; font-family:Press Start 2P');
        };
    </script>
</body>
</html>
