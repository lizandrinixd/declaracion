<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mi Declaración de Amor 💕</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            background: linear-gradient(180deg, #ff9ec8, #ff69b4, #ff1493);
            font-family: 'Press Start 2P', system-ui;
            color: #fff;
            text-align: center;
            position: relative;
        }

        canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 2;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        #start-screen, #declaration, #question, #final-screen {
            display: none;
        }

        #start-screen { display: flex; }

        #declaration-text {
            font-size: clamp(1.8rem, 7.5vw, 3.2rem);
            line-height: 1.45;
            text-shadow: 6px 6px 0 #222, -3px -3px 0 #222, 3px -3px 0 #222, -3px 3px 0 #222;
            color: #ff0;
            margin-bottom: 30px;
            padding: 25px 20px;
            background: rgba(0,0,0,0.4);
            border: 8px solid #fff;
            max-width: 95%;
        }

        button {
            font-family: 'Press Start 2P', system-ui;
            font-size: clamp(1.6rem, 6.5vw, 2.6rem);
            padding: 22px 50px;
            margin: 15px;
            border: 8px solid #222;
            background: #ffff00;
            color: #222;
            cursor: pointer;
            box-shadow: 8px 8px 0 #222;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        button:active {
            transform: scale(0.93);
            box-shadow: 4px 4px 0 #222;
        }

        #next-btn {
            background: #ff69b4;
            color: white;
            margin-top: 40px;
        }

        .buttons {
            display: flex;
            justify-content: center;
            gap: 40px;
            flex-wrap: wrap;
            margin-top: 40px;
        }

        #no-btn { background: #ff1493; color: #fff; }

        .message {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.9);
            color: #ff0;
            padding: 35px 60px;
            font-size: clamp(2rem, 8vw, 3.5rem);
            border: 10px solid #fff;
            display: none;
            z-index: 20;
            box-shadow: 0 0 0 12px #222;
        }

        #final-text {
            font-size: clamp(2.6rem, 10vw, 4.8rem);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.08); }
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <!-- Pantalla inicial -->
    <div class="overlay" id="start-screen">
        <h1 style="color:#fff;">¿Lista para mi declaración?</h1>
        <button id="start-btn">DECLARACIÓN</button>
    </div>

    <!-- Declaración paso a paso -->
    <div class="overlay" id="declaration">
        <p id="declaration-text">Desde que llegaste a mi vida...</p>
        <button id="next-btn">SIGUIENTE →</button>
    </div>

    <!-- Pregunta -->
    <div class="overlay" id="question">
        <h1>¿QUIERES SER MI NOVIA?</h1>
        <div class="buttons">
            <button id="si-btn">SÍ</button>
            <button id="no-btn">NO</button>
        </div>
    </div>

    <!-- Mensaje "estoy jugando" -->
    <div class="message" id="playing-message">¡ESTOY JUGANDO! </div>

    <!-- Pantalla final -->
    <div class="overlay" id="final-screen">
        <h1 id="final-text">¡YO TAMBIÉN QUIERO SERLO!</h1>
        <p style="font-size:1.5rem; margin-top:20px;">💕 Te amo con todo mi corazón 💕</p>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let width, height;

        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
        }
        window.addEventListener('resize', resize);
        resize();

        let particles = [];
        let bees = [];
        let specialHeart = null;
        let currentMode = 'roses';
        let flowerSpawnTimer = 0;

        class Particle {
            constructor(type) {
                this.type = type;
                this.reset();
            }
            reset() {
                this.x = Math.random() * width;
                this.y = -80 - Math.random() * 150;
                this.size = this.type === 'bee' ? 28 : this.type === 'heart' ? 35 : 42;
                this.speed = this.type === 'bee' ? 2 : 3.5 + Math.random() * 2;
                this.vx = this.type === 'bee' ? (Math.random()*4 - 2) : (Math.random()*2.8 - 1.4);
                this.vy = this.speed;
                this.angle = Math.random() * Math.PI * 2;
                this.swing = 18 + Math.random() * 25;
            }
            update() {
                if (this.type === 'bee') {
                    this.angle += 0.07;
                    this.x += Math.cos(this.angle) * 3.2 + this.vx;
                    this.y += Math.sin(this.angle * 1.5) * 2 + 1.6;
                    if (this.x < 0 || this.x > width) this.vx *= -1;
                } else {
                    this.y += this.vy;
                    this.x += Math.sin(this.y / this.swing) * 2;
                    if (this.y > height + 120) this.reset();
                }
            }
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                if (this.type !== 'bee') ctx.rotate(Math.sin(this.y / 70) * 0.35);
                ctx.font = `${this.size}px system-ui`;
                ctx.fillText(this.type === 'rose' ? '🌹' : this.type === 'white' ? '🌸' : this.type === 'heart' ? '❤️' : '🐝', 0, 0);
                ctx.restore();
            }
        }

        function animate() {
            ctx.clearRect(0, 0, width, height);

            if (currentMode === 'roses') {
                flowerSpawnTimer++;
                if (flowerSpawnTimer > 12) {
                    const type = Math.random() > 0.48 ? 'rose' : 'white';
                    particles.push(new Particle(type));
                    flowerSpawnTimer = 0;
                }
            }

            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.update();
                p.draw();
                if (p.y > height + 200) particles.splice(i, 1);
            }

            if (currentMode === 'beeshearts') {
                bees.forEach(b => { b.update(); b.draw(); });
            }

            if (currentMode === 'finalheart' && specialHeart) {
                specialHeart.pulse = Math.sin(Date.now()/130) * 0.28 + 1;
                specialHeart.x += specialHeart.vx;
                specialHeart.y += specialHeart.vy;
                if (specialHeart.x < 60 || specialHeart.x > width - 60) specialHeart.vx *= -1;
                if (specialHeart.y < 60 || specialHeart.y > height - 60) specialHeart.vy *= -1;

                ctx.save();
                ctx.translate(specialHeart.x, specialHeart.y);
                ctx.scale(specialHeart.pulse, specialHeart.pulse);
                ctx.font = (specialHeart.size * specialHeart.pulse) + 'px system-ui';
                ctx.fillText('❤️', -specialHeart.size/2, specialHeart.size/3);
                ctx.restore();
            }

            requestAnimationFrame(animate);
        }

        function createBeesAndHearts() {
            particles = [];
            bees = [];
            for (let i = 0; i < 4; i++) {
                let bee = new Particle('bee');
                bee.x = width * (0.18 + i * 0.21);
                bee.y = height * 0.28 + Math.random() * 70;
                bees.push(bee);
            }
            for (let i = 0; i < 30; i++) {
                let h = new Particle('heart');
                h.y = -Math.random() * height * 1.2;
                particles.push(h);
            }
        }

        function createFinalHeart() {
            specialHeart = { x: width/2, y: height/2, vx: 5.8, vy: 5.8, size: 95, pulse: 1 };
        }

        const declarationParts = [
            "Desde que llegaste a mi vida,",
            "todo se siente diferente…",
            "más bonito, más especial.",
            "No sé cómo lo hiciste,",
            "pero te volviste alguien muy importante para mí.",
            "Solo quería que lo supieras…",
            "me gustas mucho ❤️"
        ];

        let currentPart = 0;
        const textEl = document.getElementById('declaration-text');
        const nextBtn = document.getElementById('next-btn');

        function showNextPart() {
            if (currentPart < declarationParts.length) {
                textEl.style.opacity = 0;
                setTimeout(() => {
                    textEl.textContent = declarationParts[currentPart];
                    textEl.style.opacity = 1;
                    currentPart++;
                }, 400);
            } else {
                document.getElementById('declaration').style.display = 'none';
                currentMode = 'beeshearts';
                createBeesAndHearts();
                document.getElementById('question').style.display = 'flex';
            }
        }

        document.getElementById('start-btn').addEventListener('click', () => {
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('declaration').style.display = 'flex';
            currentMode = 'roses';
            particles = [];
            flowerSpawnTimer = 0;
            currentPart = 0;
            textEl.textContent = declarationParts[0];
            currentPart = 1;
        });

        nextBtn.addEventListener('click', showNextPart);

        // ==================== CAMBIO PRINCIPAL ====================
        const siBtn = document.getElementById('si-btn');
        const noBtn = document.getElementById('no-btn');
        const playingMsg = document.getElementById('playing-message');
        const finalScreen = document.getElementById('final-screen');

        function randomPosition(btn) {
            const x = Math.random() * (width * 0.75) + width * 0.12;
            const y = Math.random() * (height * 0.65) + height * 0.18;
            btn.style.position = 'absolute';
            btn.style.left = `${x}px`;
            btn.style.top = `${y}px`;
        }

        // Solo 1 clic en SÍ → va directo a la pantalla final
        siBtn.addEventListener('click', () => {
            currentMode = 'finalheart';
            createFinalHeart();
            document.getElementById('question').style.display = 'none';
            finalScreen.style.display = 'flex';
        });

        // Botón NO sigue moviéndose y mostrando el mensaje
        noBtn.addEventListener('click', () => {
            randomPosition(noBtn);
            playingMsg.style.display = 'block';
            setTimeout(() => playingMsg.style.display = 'none', 2200);
        });

        animate();
    </script>
</body>
</html>
